<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adrenalyn Tracker PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Adrenalyn <span>PRO</span></h1>
                <div class="stats-badge" id="stats-summary">
                    0/0 (0%)
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar por número o nombre...">
                <button id="scan-btn" class="icon-btn" title="Escanear carta">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M4,4H7V6H4V9H2V4A2,2 0 0,1 4,4M20,4A2,2 0 0,1 22,6V9H20V6H17V4H20M4,20V17H2V22A2,2 0 0,0 4,20M20,20H17V22H22V17H20V20M12,10A3,3 0 0,1 15,13A3,3 0 0,1 12,16A3,3 0 0,1 9,13A3,3 0 0,1 12,10M17,13C17,10.24 14.76,8 12,8C9.24,8 7,10.24 7,13C7,15.76 9.24,18 12,18C14.76,18 17,15.76 17,13Z"/></svg>
                </button>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="missing">Faltan</button>
                <button class="filter-btn" data-filter="repeated">Repes</button>
                <select id="team-filter" class="filter-select">
                    <option value="all">Filtro por Equipo / Serie</option>
                    <!-- Teams will be injected here -->
                </select>
            </div>
        </header>

        <main id="card-grid" class="card-grid">
            <!-- Cards will be injected here -->
            <div class="loader">Generando colección...</div>
        </main>

        <div id="ai-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Escáner Inteligente</h3>
                
                <div id="scan-preview" class="scan-preview">
                    <video id="video-feed" autoplay playsinline muted></video>
                    <div class="camera-frame"></div>
                </div>
                <canvas id="crop-canvas" style="display: none;"></canvas>
                <div id="ai-status" class="ai-status"></div>
                
                <div class="api-key-section">
                    <input type="password" id="api-key-input" placeholder="Tu API Key de OpenRouter">
                </div>

                <div class="scanner-actions">
                    <button id="capture-btn" class="primary-btn">📸 Capturar Carta</button>
                    <button id="toggle-camera-btn" class="secondary-btn">🔄 Girar Cámara</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" data-page="collection">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19,5V19H5V5H19M19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M14,17H7V15H14V17M17,13H7V11H17V13M17,9H7V7H17V9Z"/></svg>
                <span>Colección</span>
            </div>
            <div class="nav-item" id="ai-assistant-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z"/></svg>
                <span>IA Helper</span>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
